apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-iqss          # nom du déploiement
  namespace: uat
spec:
  replicas: 1             # nombre de pods à lancer
  selector:
    matchLabels:
      app: api-iqss
  template:
    metadata:
      labels:
        app: api-iqss
    spec:
      containers:
      - name: api-iqss
        image: 10.2.240.5:8080/production/api-iqss:uat-292c793e57e26e87b129818b7c9b8e2b409aa3fe
        ports:
        - containerPort: 8080   # port sur lequel FastAPI écoute
        env:
        - name: APP_ENV
          value: "uat"
        envFrom:
        - secretRef:
            name: api-iqss-secret
        volumeMounts:
        - name: data-volume
          mountPath: /api-iqss/data
      volumes:
      - name: data-volume
        persistentVolumeClaim:
          claimName: api-iqss-data
      imagePullSecrets:
      - name: harbor-secret     # secret pour s'authentifier à Harbor
