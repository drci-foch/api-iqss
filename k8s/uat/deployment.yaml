apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-iqss          # nom du déploiement
  namespace: uat
spec:
  replicas: 1             # nombre de pods à lancer
  selector:
    matchLabels:
      app: api-iqss
  template:
    metadata:
      labels:
        app: api-iqss
    spec:
      containers:
      - name: api-iqss
        image: 10.2.240.5:8080/production/api-iqss:uat-a5ff1f1672002ce9c125b5493e33da55da67b285
        ports:
        - containerPort: 8080   # port sur lequel FastAPI écoute
        env:
        - name: APP_ENV
          value: "uat"
        envFrom:
        - secretRef:
            name: api-iqss-secret
        volumeMounts:
        - name: data-volume
          mountPath: /api-iqss/data
        # Exécution de la commande de nettoyage
        command: ["/bin/sh", "-c", "rm -rf /api-iqss/data/* && exec /start.sh"]
      volumes:
      - name: data-volume
        persistentVolumeClaim:
          claimName: api-iqss-data
      imagePullSecrets:
      - name: harbor-secret     # secret pour s'authentifier à Harbor
