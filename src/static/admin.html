<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Administration – Hôpital Foch</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    :root {
      --foch-blue-dark: #003f72;
      --foch-blue: #005c99;
      --foch-blue-light: #e6f0f8;
      --foch-accent: #00a0a8;
      --foch-danger: #c62828;
      --bg-body: #f5f7fb;
      --text-main: #1f2933;
      --text-muted: #6b7280;
      --radius-lg: 16px;
      --shadow-soft: 0 18px 45px rgba(15, 23, 42, 0.18);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    body {
      min-height: 100vh;
      background: radial-gradient(circle at top left, #f0f6ff, #f5f7fb 55%, #e9f2ff);
      color: var(--text-main);
      padding: 24px;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
    }

    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
    }

    .top-bar h1 {
      font-size: 22px;
      font-weight: 600;
      color: var(--foch-blue-dark);
    }

    .top-bar-links {
      display: flex;
      gap: 16px;
      align-items: center;
      font-size: 13px;
    }

    .top-bar-links a {
      color: var(--foch-blue);
      text-decoration: underline;
      text-underline-offset: 2px;
    }

    .card {
      background: #ffffff;
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-soft);
      padding: 24px;
      margin-bottom: 24px;
    }

    .card h2 {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 16px;
      color: var(--foch-blue-dark);
    }

    .form-row {
      display: flex;
      gap: 12px;
      align-items: flex-end;
      flex-wrap: wrap;
      margin-bottom: 8px;
    }

    .form-field {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .form-field.grow {
      flex: 1;
      min-width: 140px;
    }

    label {
      font-size: 12px;
      font-weight: 500;
      color: #374151;
    }

    input, select {
      border-radius: 8px;
      border: 1px solid #d1d5db;
      padding: 8px 10px;
      font-size: 13px;
      outline: none;
      background: #f9fafb;
      transition: border-color 0.16s ease;
    }

    input:focus, select:focus {
      border-color: var(--foch-blue);
      background: #fff;
    }

    .btn {
      border: none;
      padding: 8px 16px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: transform 0.12s ease, opacity 0.12s ease;
      white-space: nowrap;
    }

    .btn:hover { transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }

    .btn-primary {
      background: linear-gradient(135deg, var(--foch-blue), var(--foch-accent));
      color: white;
      box-shadow: 0 6px 18px rgba(5, 101, 156, 0.35);
    }

    .btn-danger {
      background: var(--foch-danger);
      color: white;
      box-shadow: 0 4px 12px rgba(198, 40, 40, 0.3);
      font-size: 12px;
      padding: 5px 12px;
    }

    .btn-small {
      font-size: 12px;
      padding: 5px 12px;
      background: var(--foch-blue-light);
      color: var(--foch-blue-dark);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    thead th {
      text-align: left;
      padding: 10px 12px;
      border-bottom: 2px solid #e0e7ff;
      color: var(--text-muted);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    tbody td {
      padding: 10px 12px;
      border-bottom: 1px solid #f0f0f0;
    }

    tbody tr:hover {
      background: #fafbff;
    }

    .role-badge {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
    }

    .role-admin { background: #fef3c7; color: #92400e; }
    .role-expert { background: #dbeafe; color: #1e40af; }
    .role-normal { background: #e5e7eb; color: #374151; }

    .msg {
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 13px;
      margin-bottom: 12px;
      display: none;
    }

    .msg.success { display: block; background: #f0fdf4; color: #166534; border: 1px solid #bbf7d0; }
    .msg.error { display: block; background: #fef2f2; color: var(--foch-danger); border: 1px solid #fecaca; }

    .actions-cell {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .actions-cell select {
      font-size: 12px;
      padding: 4px 6px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="top-bar">
      <h1>Administration des utilisateurs</h1>
      <div class="top-bar-links">
        <a href="/">Retour à l'application</a>
        <button class="btn btn-small" id="btn-logout">Se déconnecter</button>
      </div>
    </div>

    <div id="msg" class="msg"></div>

    <!-- Formulaire ajout -->
    <div class="card">
      <h2>Ajouter un utilisateur</h2>
      <form id="form-add">
        <div class="form-row">
          <div class="form-field grow">
            <label for="new-username">Identifiant</label>
            <input type="text" id="new-username" required />
          </div>
          <div class="form-field grow">
            <label for="new-password">Mot de passe</label>
            <input type="password" id="new-password" />
          </div>
          <div class="form-field">
            <label for="new-role">Role</label>
            <select id="new-role">
              <option value="normal">Normal</option>
              <option value="expert">Expert</option>
              <option value="admin">Admin</option>
            </select>
          </div>
          <div class="form-field">
            <label for="new-auth">Type</label>
            <select id="new-auth">
              <option value="local">Local</option>
              <option value="ldap">LDAP</option>
            </select>
          </div>
          <button type="submit" class="btn btn-primary">Ajouter</button>
        </div>
      </form>
    </div>

    <!-- Liste utilisateurs -->
    <div class="card">
      <h2>Utilisateurs</h2>
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Identifiant</th>
            <th>Role</th>
            <th>Type</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="users-tbody">
          <tr><td colspan="5" style="text-align:center; color: var(--text-muted);">Chargement...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <script>
    const token = localStorage.getItem("token");
    const role = localStorage.getItem("role");

    if (!token || role !== "admin") {
      window.location.href = "/";
    }

    function headers() {
      return {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + token,
      };
    }

    function showMsg(type, text) {
      const el = document.getElementById("msg");
      el.className = "msg " + type;
      el.textContent = text;
      setTimeout(() => { el.className = "msg"; }, 4000);
    }

    document.getElementById("btn-logout").addEventListener("click", () => {
      localStorage.clear();
      window.location.href = "/login";
    });

    // --- Charger la liste ---
    async function loadUsers() {
      try {
        const res = await fetch("/api/admin/users", { headers: headers() });
        if (res.status === 401 || res.status === 403) {
          localStorage.clear();
          window.location.href = "/login";
          return;
        }
        const users = await res.json();
        const tbody = document.getElementById("users-tbody");
        tbody.innerHTML = "";

        users.forEach((u) => {
          const roleClass = "role-" + u.role;
          const tr = document.createElement("tr");
          tr.innerHTML =
            '<td>' + u.id + '</td>' +
            '<td><strong>' + u.username + '</strong></td>' +
            '<td><span class="role-badge ' + roleClass + '">' + u.role + '</span></td>' +
            '<td>' + u.auth_type + '</td>' +
            '<td class="actions-cell">' +
              '<select data-id="' + u.id + '" class="role-select">' +
                '<option value="normal"' + (u.role === "normal" ? " selected" : "") + '>Normal</option>' +
                '<option value="expert"' + (u.role === "expert" ? " selected" : "") + '>Expert</option>' +
                '<option value="admin"' + (u.role === "admin" ? " selected" : "") + '>Admin</option>' +
              '</select>' +
              '<button class="btn btn-small btn-save-role" data-id="' + u.id + '">Modifier</button>' +
              '<button class="btn btn-danger btn-delete" data-id="' + u.id + '" data-username="' + u.username + '">Supprimer</button>' +
            '</td>';
          tbody.appendChild(tr);
        });

        // Event listeners
        document.querySelectorAll(".btn-save-role").forEach((btn) => {
          btn.addEventListener("click", async () => {
            const id = btn.dataset.id;
            const sel = document.querySelector('.role-select[data-id="' + id + '"]');
            const res = await fetch("/api/admin/users/" + id, {
              method: "PUT",
              headers: headers(),
              body: JSON.stringify({ role: sel.value }),
            });
            if (res.ok) {
              showMsg("success", "Role mis a jour");
              loadUsers();
            } else {
              const data = await res.json().catch(() => ({}));
              showMsg("error", data.detail || "Erreur");
            }
          });
        });

        document.querySelectorAll(".btn-delete").forEach((btn) => {
          btn.addEventListener("click", async () => {
            const username = btn.dataset.username;
            if (!confirm("Supprimer l'utilisateur " + username + " ?")) return;
            const res = await fetch("/api/admin/users/" + btn.dataset.id, {
              method: "DELETE",
              headers: headers(),
            });
            if (res.ok) {
              showMsg("success", "Utilisateur supprime");
              loadUsers();
            } else {
              const data = await res.json().catch(() => ({}));
              showMsg("error", data.detail || "Erreur");
            }
          });
        });
      } catch (err) {
        showMsg("error", "Erreur de chargement : " + err.message);
      }
    }

    // --- Ajout utilisateur ---
    document.getElementById("form-add").addEventListener("submit", async (e) => {
      e.preventDefault();
      const username = document.getElementById("new-username").value.trim();
      const password = document.getElementById("new-password").value;
      const newRole = document.getElementById("new-role").value;
      const authType = document.getElementById("new-auth").value;

      try {
        const res = await fetch("/api/admin/users", {
          method: "POST",
          headers: headers(),
          body: JSON.stringify({
            username: username,
            password: password || null,
            role: newRole,
            auth_type: authType,
          }),
        });

        if (res.ok) {
          showMsg("success", "Utilisateur " + username + " cree");
          document.getElementById("form-add").reset();
          loadUsers();
        } else {
          const data = await res.json().catch(() => ({}));
          showMsg("error", data.detail || "Erreur lors de la creation");
        }
      } catch (err) {
        showMsg("error", err.message);
      }
    });

    loadUsers();
  </script>
</body>
</html>
