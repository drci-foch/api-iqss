<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Connexion – Hôpital Foch</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    :root {
      --foch-blue-dark: #003f72;
      --foch-blue: #005c99;
      --foch-blue-light: #e6f0f8;
      --foch-accent: #00a0a8;
      --foch-danger: #c62828;
      --bg-body: #f5f7fb;
      --text-main: #1f2933;
      --text-muted: #6b7280;
      --radius-lg: 16px;
      --shadow-soft: 0 18px 45px rgba(15, 23, 42, 0.18);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
        Roboto, sans-serif;
    }

    body {
      min-height: 100vh;
      background: radial-gradient(circle at top left, #f0f6ff, #f5f7fb 55%, #e9f2ff);
      color: var(--text-main);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .login-card {
      width: 100%;
      max-width: 420px;
      background: #ffffff;
      border-radius: 24px;
      box-shadow: var(--shadow-soft);
      overflow: hidden;
    }

    .login-header {
      background: linear-gradient(145deg, var(--foch-blue-dark), var(--foch-blue));
      color: white;
      padding: 28px 32px;
      text-align: center;
    }

    .login-header .logo {
      width: 48px;
      height: 48px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.16);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 22px;
      margin-bottom: 12px;
    }

    .login-header h1 {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .login-header p {
      font-size: 13px;
      opacity: 0.85;
    }

    .login-body {
      padding: 28px 32px 32px;
    }

    .form-field {
      display: flex;
      flex-direction: column;
      gap: 4px;
      margin-bottom: 16px;
    }

    label {
      font-size: 13px;
      font-weight: 500;
      color: #374151;
    }

    input[type="text"],
    input[type="password"] {
      border-radius: 10px;
      border: 1px solid #d1d5db;
      padding: 10px 12px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.16s ease, box-shadow 0.16s ease;
      background: #f9fafb;
    }

    input:focus {
      border-color: var(--foch-blue);
      box-shadow: 0 0 0 2px rgba(0, 92, 153, 0.15);
      background: #ffffff;
    }

    .btn-login {
      width: 100%;
      border: none;
      background: linear-gradient(135deg, var(--foch-blue), var(--foch-accent));
      color: white;
      padding: 11px 16px;
      border-radius: 999px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      box-shadow: 0 10px 25px rgba(5, 101, 156, 0.4);
      transition: transform 0.14s ease, box-shadow 0.14s ease;
      margin-top: 8px;
    }

    .btn-login:hover {
      transform: translateY(-1px);
      box-shadow: 0 14px 30px rgba(5, 101, 156, 0.5);
    }

    .btn-login:active {
      transform: translateY(0);
    }

    .btn-login[disabled] {
      opacity: 0.6;
      cursor: wait;
    }

    .error-msg {
      background: #fef2f2;
      color: var(--foch-danger);
      border: 1px solid #fecaca;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
    }

    .error-msg.visible {
      display: block;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-header">
      <div class="logo">HF</div>
      <h1>Indicateurs Lettres de Liaison</h1>
      <p>Connectez-vous pour accéder à l'application</p>
    </div>

    <div class="login-body">
      <div id="error-msg" class="error-msg"></div>

      <form id="login-form">
        <div class="form-field">
          <label for="username">Identifiant</label>
          <input type="text" id="username" name="username" required autofocus autocomplete="username" />
        </div>

        <div class="form-field">
          <label for="password">Mot de passe</label>
          <input type="password" id="password" name="password" required autocomplete="current-password" />
        </div>

        <button type="submit" class="btn-login" id="btn-login">
          Se connecter
        </button>
      </form>
    </div>
  </div>

  <script>
    // Si déjà connecté, rediriger vers l'accueil
    if (localStorage.getItem("token")) {
      window.location.href = "/";
    }

    const form = document.getElementById("login-form");
    const errorMsg = document.getElementById("error-msg");
    const btnLogin = document.getElementById("btn-login");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      errorMsg.classList.remove("visible");
      btnLogin.disabled = true;
      btnLogin.textContent = "Connexion en cours...";

      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value;

      try {
        const response = await fetch("/api/auth/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username, password }),
        });

        if (!response.ok) {
          const data = await response.json().catch(() => ({}));
          throw new Error(data.detail || "Identifiants incorrects");
        }

        const data = await response.json();
        localStorage.setItem("token", data.access_token);
        localStorage.setItem("role", data.role);
        localStorage.setItem("username", data.username);
        window.location.href = "/";
      } catch (err) {
        errorMsg.textContent = err.message;
        errorMsg.classList.add("visible");
      } finally {
        btnLogin.disabled = false;
        btnLogin.textContent = "Se connecter";
      }
    });
  </script>
</body>
</html>
